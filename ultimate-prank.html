<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oh No!</title>
<style>
body {
    margin:0;
    padding:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:sans-serif;
    overflow:hidden;
    position:relative;
    color:white;
    text-align:center;
}
#screen{
    position:relative;
    width:100%;
    height:100%;
    background:#000;
    cursor:pointer;
}
.crack{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:url('https://i.imgur.com/jV8v6I4.png') no-repeat center center;
    background-size:cover;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.5s ease-in-out;
}
.crack2{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:url('https://i.imgur.com/N5z9MxH.png') no-repeat center center;
    background-size:cover;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.5s ease-in-out;
}
.message{
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:28px;
    font-weight:bold;
    display:none;
    color:#ff4c4c;
}
.final-msg{
    position:absolute;
    top:60%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:24px;
    font-weight:bold;
    display:none;
    color:#ff69b4;
}
.shard{
    position:absolute;
    font-size:24px;
    animation:shardFall 2s linear forwards;
}
@keyframes shardFall{
    0% {transform:translateY(0px) rotate(0deg); opacity:1;}
    100% {transform:translateY(300px) rotate(360deg); opacity:0;}
}
</style>
</head>
<body>
<div id="screen"></div>
<div class="crack" id="crack"></div>
<div class="crack2" id="crack2"></div>
<div class="message" id="msg">😱 آپ کا موبائل ٹوٹ گیا!</div>
<div class="final-msg" id="finalMsg">❤️ Surprise! محبت کا پیغام: تم بہت خاص ہو 😄❤️</div>

<audio id="glassSound" src="https://www.soundjay.com/mechanical/sounds/glass-break-01.mp3"></audio>

<script>
let cracked=false;
let screen=document.getElementById('screen');
let crack=document.getElementById('crack');
let crack2=document.getElementById('crack2');
let msg=document.getElementById('msg');
let finalMsg=document.getElementById('finalMsg');
let sound=document.getElementById('glassSound');

// Prevent back button / exit
history.pushState(null, document.title, location.href);
window.addEventListener('popstate', function (event) {
    history.pushState(null, document.title, location.href);
});

// Prevent right-click
document.addEventListener('contextmenu', e => e.preventDefault());

// Prevent scroll
document.addEventListener('scroll', e => window.scrollTo(0,0));

screen.addEventListener('click', function(){
    if(!cracked){
        sound.play();
        crack.style.opacity = 1;

        // Flicker effect
        let flickerCount=0;
        let flicker=setInterval(()=>{
            crack2.style.opacity = flickerCount%2;
            flickerCount++;
            if(flickerCount>5){
                clearInterval(flicker);
                crack2.style.opacity = 1;
            }
        },200);

        // Show message
        msg.style.display = 'block';

        // Vibration if supported
        if(navigator.vibrate){
            navigator.vibrate([200,100,200]);
        }

        // Floating shards
        for(let i=0;i<15;i++){
            let shard=document.createElement('div');
            shard.className='shard';
            shard.innerHTML='💔';
            shard.style.left=Math.random()*90+'%';
            shard.style.top='0%';
            shard.style.color=['#ff4c4c','#ff1493','#ff6347','#ff4500'][Math.floor(Math.random()*4)];
            document.body.appendChild(shard);
            setTimeout(()=>{shard.remove();},2000);
        }

        // Final romantic message
        setTimeout(()=>{finalMsg.style.display='block';},2500);

        cracked=true;
    }
});
</script>
</body>
</html>
